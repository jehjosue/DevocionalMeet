<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3652/3652191.png">
  <link rel="manifest" href="/manifest.json">
  <title>DevocionalMeet v2.2 - Comunhão & Fé</title>
  <script>
    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW registration failed:', err));
      });
    }

    // Fix for "Cannot set property fetch of #<Window> which has only a getter"
    // Some polyfills try to overwrite window.fetch which might be read-only in some environments.
    (function () {
      try {
        var nativeFetch = window.fetch;
        if (nativeFetch) {
          Object.defineProperty(window, 'fetch', {
            get: function () { return nativeFetch; },
            set: function () { console.warn('Polyfill attempted to overwrite window.fetch - ignored to prevent crash.'); },
            configurable: true
          });
        }
      } catch (e) {
        console.error('Failed to apply fetch fix:', e);
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
